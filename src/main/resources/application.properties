spring.application.name=pdciae-back
# Deshabilitamos Docker Compose para evitar conflictos en el entorno de Render
spring.docker.compose.enabled=false

# Forzamos el uso de la variable de entorno definida en el dashboard de Render
# Si la variable MONGODB_URI no está presente, la aplicación fallará al arrancar,
# lo cual es preferible para detectar errores de configuración.
spring.data.mongodb.uri=${MONGODB_URI}

# Render asigna dinámicamente un puerto a través de la variable PORT
server.port=${PORT:8080}